{% assign home_url = '/' | relative_url %}
{% assign meetings_url = '/meetings.html' | relative_url %}
{% assign resources_url = '/resources.html' | relative_url %}
<div class="mobile-menu" id="mobile-menu" data-mobile-menu data-lenis-prevent hidden>
  <nav class="mobile-menu-nav" aria-label="Mobile navigation">
    {% if page.is_home %}
      <a href="#projects" data-mobile-menu-link>Projects</a>
      <a href="#what-we-do" data-mobile-menu-link>What We Do</a>
      <a href="#faq" data-mobile-menu-link>FAQ</a>
    {% else %}
      <a href="{{ home_url }}#projects" data-mobile-menu-link>Projects</a>
      <a href="{{ home_url }}#what-we-do" data-mobile-menu-link>What We Do</a>
      <a href="{{ home_url }}#faq" data-mobile-menu-link>FAQ</a>
    {% endif %}
    <a href="{{ meetings_url }}" data-mobile-menu-link>Meetings</a>
    <a href="{{ resources_url }}" data-mobile-menu-link>Resources</a>
    <button type="button" data-open-join data-mobile-menu-link>Join</button>
  </nav>
</div>
